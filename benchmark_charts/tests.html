<script>
// Minimal test harness
let passed=0, failed=0, total=0;
const out = document.getElementById('results');

function assert(cond, name, detail='') {
  total++;
  if (cond) { passed++; log('PASS', name, detail); }
  else { failed++; log('FAIL', name, detail); }
}
function log(status, name, detail) {
  const cls = status==='PASS'?'pass':'fail';
  out.innerHTML += `<div class="${cls}">[${status}] ${name}</div>`;
  if (detail) out.innerHTML += `<pre class="info">${detail}</pre>`;
}
function section(name) {
  out.innerHTML += `<div class="section">${name}</div>`;
}
function summary() {
  out.innerHTML += `<br><div class="${failed?'fail':'pass'}">═══ ${passed}/${total} passed, ${failed} failed ═══</div>`;
}

<!-- Inline testable functions from app.js (no DOM/network dependencies) -->
<script>
// ── calcEMA ──
function calcEMA(c, span) {
  const k = 2/(span+1), e = [c[0]];
  for (let i=1;i<c.length;i++) e.push(c[i]*k+e[i-1]*(1-k));
  return e;
}

// ── repairJSON ──
function repairJSON(raw) {
  let s = raw;
  s = s.replace(/,\s*([}\]])/g, '$1');
  s = s.replace(/:\s*NaN\b/g, ': null');
  s = s.replace(/:\s*-?Infinity\b/g, ': null');
  s = s.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g, '');
  if (s.includes("'") && !s.includes('"')) {
    s = s.replace(/'/g, '"');
  }
  return s;
}

// ── tryCloseTruncated ──
function tryCloseTruncated(s) {
  let braces = 0, brackets = 0;
  for (const ch of s) {
    if (ch === '{') braces++;
    else if (ch === '}') braces--;
    else if (ch === '[') brackets++;
    else if (ch === ']') brackets--;
  }
  let patched = s.replace(/,\s*"[^"]*"?\s*:?\s*$/, '');
  patched = patched.replace(/,\s*$/, '');
  while (brackets > 0) { patched += ']'; brackets--; }
  while (braces > 0) { patched += '}'; braces--; }
  return patched;
}

// ── parseResponse (with 3-step repair) ──
function parseResponse(content, reasoning, symbol='?') {
  let c = content.replace(/```json/g,'').replace(/```/g,'').trim();
  if (c.includes('</think>')) c = c.slice(c.indexOf('</think>')+8).trim();
  if (c.startsWith('<think>')) c = '';
  const si=c.indexOf('{'), ei=c.lastIndexOf('}')+1;
  if (si===-1||ei<=si) throw new Error('No JSON in response: '+content.slice(0,120));
  
  let jsonStr = c.slice(si,ei);
  try { return {spec: JSON.parse(jsonStr), reasoning}; } catch(e1) {}
  const repaired = repairJSON(jsonStr);
  try { return {spec: JSON.parse(repaired), reasoning}; } catch(e2) {}
  const closed = tryCloseTruncated(repaired);
  try { return {spec: JSON.parse(closed), reasoning}; } catch(e3) {
    throw new Error(`JSON parse failed after repair: ${e3.message}`);
  }
}

// ── buildPrompt ──
const TIMEFRAMES = {
  short:  { id:'short',  range:'3mo', interval:'1d',  label:'3M Daily',   promptLabel:'SHORT-TERM (3 months, daily candles)' },
  medium: { id:'medium', range:'1y',  interval:'1wk', label:'1Y Weekly',  promptLabel:'MEDIUM-TERM (1 year, weekly candles)' },
  long:   { id:'long',   range:'5y',  interval:'1mo', label:'5Y Monthly', promptLabel:'LONG-TERM (5 years, monthly candles)' }
};
function buildPrompt(symbol, data, iter, prev, tfConfig) {
  tfConfig = tfConfig || TIMEFRAMES.short;
  const tailN = tfConfig.id === 'long' ? 60 : tfConfig.id === 'medium' ? 52 : 30;
  const recent = data.slice(-tailN);
  let d = "Date | Open | High | Low | Close | Volume\n";
  recent.forEach(r => d += `${r.date} | ${r.open} | ${r.high} | ${r.low} | ${r.close} | ${r.volume}\n`);
  let p = `You are an elite quantitative technical analyst.\nAnalyze the ${tfConfig.promptLabel} OHLCV data for ${symbol}.`;
  if (iter > 1 && prev.length) {
    p += "\n\n--- PREVIOUS ITERATIONS ---\n";
    prev.forEach(x => {
      p += `\nIteration ${x.iteration} (${x.strategy_name}, conf: ${x.confidence}):\n`;
    });
    p += "--- END ---\nThis is iteration " + iter + ". Try a DIFFERENT strategy. IMPROVE.\n";
  }
  p += "\nData:\n" + d;
  return p;
}

// ── Model Registry (mirror of app.js) ──
const MODELS = [
  { id:'141', name:'No Model (141)', endpoint:'http://10.0.0.141:8000/v1/chat/completions', model:'', ready: false },
  { id:'30',  name:'No Model (30)',  endpoint:'http://10.0.0.30:8000/v1/chat/completions',  model:'', ready: false },
];
let activeModelIdx = 0;
function getVLLM() { return MODELS[activeModelIdx].endpoint; }
function getMODEL() { return MODELS[activeModelIdx].model; }

// ── handleAction logic (standalone for testing) ──
function simulateHandleAction(action, ticker, tfd) {
  const result = { statusMsg: '', analysisMsg: '', approved: false, rejected: false, reIterated: false, skipped: false, advanced: false };
  if (action === 'APPROVE') {
    if (tfd) { tfd.approved = true; tfd.rejected = false; }
    ticker.approved = true;
    result.statusMsg = `✓ ${ticker.symbol} APPROVED`;
    result.analysisMsg = '✓ APPROVED — ' + (tfd?.analysis || 'Analysis accepted.');
    result.approved = true;
    result.advanced = true;
  } else if (action === 'REJECT') {
    if (tfd) { tfd.approved = false; tfd.rejected = true; }
    result.statusMsg = `✗ ${ticker.symbol} REJECTED — re-iterating...`;
    result.rejected = true;
    result.reIterated = true;
  } else if (action === 'SKIP') {
    result.statusMsg = `${ticker.symbol} skipped`;
    result.skipped = true;
    result.advanced = true;
  }
  return result;
}

// ── localStorage stubs ──
const _store = {};
const _localStorage = {
  getItem: k => _store[k] || null,
  setItem: (k,v) => { _store[k]=v; },
  removeItem: k => { delete _store[k]; }
};
</script>

section('EMA Calculation');

(function() {
  const closes = [100, 102, 104, 103, 105];
  const ema = calcEMA(closes, 3);
  assert(ema.length === 5, 'EMA: output length matches input');
  assert(ema[0] === 100, 'EMA: first value equals first close');
  assert(typeof ema[4] === 'number' && !isNaN(ema[4]), 'EMA: all values are numbers');
  assert(Math.abs(ema[1] - 101) < 0.01, 'EMA: second value correct (k=0.5)', `Expected 101, got ${ema[1]}`);
})();

(function() {
  const ema = calcEMA([50], 20);
  assert(ema.length === 1, 'EMA: single value returns array of 1');
  assert(ema[0] === 50, 'EMA: single value equals input');
})();

(function() {
  const closes = Array(100).fill(100);
  const ema = calcEMA(closes, 20);
  assert(ema.every(v => Math.abs(v - 100) < 0.001), 'EMA: constant input = constant output');
})();

(function() {
  const content = '{"overlays":[],"analysis":"test","strategy_name":"EMA Cross","confidence":0.8}';
  const {spec} = parseResponse(content, '');
  assert(spec.analysis === 'test', 'parseResponse: clean JSON parses correctly');
  assert(spec.strategy_name === 'EMA Cross', 'parseResponse: strategy_name extracted');
  assert(spec.confidence === 0.8, 'parseResponse: confidence extracted');
})();

(function() {
  const content = '```json\n{"overlays":[],"analysis":"fenced"}\n```';
  const {spec} = parseResponse(content, '');
  assert(spec.analysis === 'fenced', 'parseResponse: strips code fences');
})();

(function() {
  const content = '<think>\nRSI is 65.\n</think>\n{"overlays":[],"analysis":"think_test"}';
  const {spec, reasoning} = parseResponse(content, 'RSI is 65.');
  assert(spec.analysis === 'think_test', 'parseResponse: extracts JSON after </think>');
  assert(reasoning === 'RSI is 65.', 'parseResponse: reasoning passed through');
})();

(function() {
  let threw = false;
  try { parseResponse('no json here', ''); } catch(e) { threw = true; }
  assert(threw, 'parseResponse: throws on no JSON');
})();

(function() {
  let threw = false;
  try { parseResponse('{bad json here}', ''); } catch(e) { threw = true; }
  assert(threw, 'parseResponse: throws on malformed JSON');
})();

(function() {
  const content = 'Here is my analysis:\n{"overlays":[],"analysis":"leading_text"}';
  const {spec} = parseResponse(content, '');
  assert(spec.analysis === 'leading_text', 'parseResponse: handles leading text before JSON');

(function() {

(function() {

// PLAN PARSER TESTS
// ══════════════════════════════════════════
section('parsePlanResponse');

// Mock TOOL_REGISTRY for tests
const MOCK_TOOL_REGISTRY = {
  CALC_RSI: true, CALC_ATR: true, CALC_BOLLINGER: true, CALC_ZSCORE: true,
  CALC_FIBONACCI: true, CALC_MACD: true, CALC_WAVETREND: true, CALC_VFI: true,
  CALC_VWAP: true, CALC_SQUEEZE_MOMENTUM: true, CALC_MACD_LEADER: true,
  SEARCH_WIKIPEDIA: true, SEARCH_ARXIV: true, STRATEGY_LOOKUP: true,
  SUGGEST_STRATEGY: true, GET_MEMORY: true, GET_BEST_CHAINS: true,
  RESEARCH_SYMBOL: true,
};
const PLANNER_MAX_TOOLS = 8;

function parsePlanResponse(content, reasoning, symbol) {
  // Reuse existing parse infrastructure
  let c = content.replace(/```json/g,'').replace(/```/g,'').trim();
  if (c.includes('</think>')) c = c.slice(c.indexOf('</think>')+8).trim();
  const si=c.indexOf('{'), ei=c.lastIndexOf('}')+1;
  if (si===-1||ei<=si) throw new Error('No JSON in plan response');
  let jsonStr = c.slice(si,ei);

  // Try parse with repair
  let raw;
  try { raw = JSON.parse(jsonStr); } catch(e1) {
    const repaired = repairJSON(jsonStr);
    try { raw = JSON.parse(repaired); } catch(e2) {
      const closed = tryCloseTruncated(repaired);
      raw = JSON.parse(closed);
    }
  }

  let plan = Array.isArray(raw.plan) ? raw.plan : [];
  plan = plan.filter(step => {
    if (!step || !step.tool) return false;
    const name = String(step.tool).toUpperCase().trim();
    if (!MOCK_TOOL_REGISTRY[name]) return false;
    step.tool = name;
    step.args = String(step.args || '').trim();
    return true;
  });
  if (plan.length > PLANNER_MAX_TOOLS) plan = plan.slice(0, PLANNER_MAX_TOOLS);
  return { plan, goal: raw.high_level_goal || '', reasoning };
}

(function() {
  const content = '{"plan":[{"tool":"CALC_RSI","args":""},{"tool":"CALC_BOLLINGER","args":""}],"high_level_goal":"Test mean reversion"}';
  const result = parsePlanResponse(content, 'thinking...', 'AAPL');
  assert(result.plan.length === 2, 'parsePlanResponse: parses 2 tools');
  assert(result.plan[0].tool === 'CALC_RSI', 'parsePlanResponse: first tool is RSI');
  assert(result.plan[1].tool === 'CALC_BOLLINGER', 'parsePlanResponse: second tool is BOLLINGER');
  assert(result.goal === 'Test mean reversion', 'parsePlanResponse: extracts goal');
  assert(result.reasoning === 'thinking...', 'parsePlanResponse: passes reasoning through');
})();

(function() {
  const content = '{"plan":[{"tool":"CALC_RSI","args":""},{"tool":"FAKE_TOOL","args":""},{"tool":"CALC_ATR","args":""}],"high_level_goal":"test"}';
  const result = parsePlanResponse(content, '', 'AAPL');
  assert(result.plan.length === 2, 'parsePlanResponse: strips unknown tool', `Got ${result.plan.length}`);
  assert(result.plan[0].tool === 'CALC_RSI', 'parsePlanResponse: keeps valid RSI');
  assert(result.plan[1].tool === 'CALC_ATR', 'parsePlanResponse: keeps valid ATR');
})();

(function() {
  const content = '{"plan":[],"high_level_goal":"no tools needed"}';
  const result = parsePlanResponse(content, '', 'AAPL');
  assert(result.plan.length === 0, 'parsePlanResponse: handles empty plan');
  assert(result.goal === 'no tools needed', 'parsePlanResponse: goal still extracted');
})();

(function() {
  // 10 tools, should be capped at 8
  const tools = Array(10).fill(null).map((_, i) => `{"tool":"CALC_RSI","args":"${i}"}`);
  const content = `{"plan":[${tools.join(',')}],"high_level_goal":"big plan"}`;
  const result = parsePlanResponse(content, '', 'AAPL');
  assert(result.plan.length === PLANNER_MAX_TOOLS, 'parsePlanResponse: caps at PLANNER_MAX_TOOLS', `Got ${result.plan.length}`);
})();

(function() {
  const content = '```json\n{"plan":[{"tool":"RESEARCH_SYMBOL","args":"AAPL earnings"}],"high_level_goal":"macro"}\n```';
  const result = parsePlanResponse(content, '', 'AAPL');
  assert(result.plan.length === 1, 'parsePlanResponse: handles fenced JSON');
  assert(result.plan[0].tool === 'RESEARCH_SYMBOL', 'parsePlanResponse: parses RESEARCH_SYMBOL');
  assert(result.plan[0].args === 'AAPL earnings', 'parsePlanResponse: preserves args');
})();

(function() {
  let threw = false;
  try { parsePlanResponse('no json here at all', '', 'AAPL'); } catch { threw = true; }
  assert(threw, 'parsePlanResponse: throws on no JSON');
})();

(function() {
  // Case insensitivity
  const content = '{"plan":[{"tool":"calc_rsi","args":""}],"high_level_goal":"test"}';
  const result = parsePlanResponse(content, '', 'AAPL');
  assert(result.plan[0].tool === 'CALC_RSI', 'parsePlanResponse: normalizes to uppercase');

  assert(_localStorage.getItem('aql_pipeline_mode') === 'deep', 'Pipeline: deep mode persists');
  _localStorage.setItem('aql_pipeline_mode', 'quick');
  assert(_localStorage.getItem('aql_pipeline_mode') === 'quick', 'Pipeline: quick mode persists');
  _localStorage.setItem('aql_pipeline_mode', 'deep'); // reset
})();

// ══════════════════════════════════════════
// TOOLS TRACE SCHEMA TESTS
// ══════════════════════════════════════════
section('Tools Trace Schema');

(function() {
  const trace = [
    { tool: 'CALC_RSI', args: '', status: 'done', result: 'RSI(14): 68.4', elapsed_ms: 12 },
    { tool: 'RESEARCH_SYMBOL', args: 'AAPL earnings', status: 'done', result: 'Apple Q1...', elapsed_ms: 1800 },
    { tool: 'CALC_ATR', args: '', status: 'error', result: 'Error: not enough data', elapsed_ms: 5 },
  ];
  assert(trace.length === 3, 'ToolsTrace: 3 entries');
  assert(trace[0].status === 'done', 'ToolsTrace: first entry done');
  assert(trace[2].status === 'error', 'ToolsTrace: third entry error');
  assert(typeof trace[1].elapsed_ms === 'number', 'ToolsTrace: elapsed_ms is number');

  // Simulate synthesizer prompt injection
  let prompt = '--- TOOL RESULTS ---\n';
  for (const t of trace) {
    const icon = t.status === 'done' ? '✓' : '✗';
    prompt += `[${icon} ${t.tool}]: ${t.result.slice(0, 500)}\n`;
  }
  assert(prompt.includes('RSI(14): 68.4'), 'ToolsTrace: RSI result injected into prompt');
  assert(prompt.includes('Apple Q1'), 'ToolsTrace: Research result injected');
  assert(prompt.includes('Error:'), 'ToolsTrace: Error result injected');
})();

summary();
</script>
